server:
  persistentVolume:
    enabled: false
    existingClaim: ""
    mountPath: /data
    size: 10Gi
  retention: "15d"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

grafana:
  enabled: false

alertmanager:
  enabled: true
  persistence:
    enabled: false
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
