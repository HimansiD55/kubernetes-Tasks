server:
  persistentVolume:
    enabled: true
    size: 8Gi

alertmanager:
  persistence:
    enabled: true
    size: 2Gi

serverFiles:
  alerting_rules.yml:
    groups:
      - name: node-alerts
        rules:

          - alert: HighCPUUsage
            expr: |
              (
                1 - avg by (instance) (
                  rate(node_cpu_seconds_total{mode="idle"}[5m])
                )
              ) * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU on {{ $labels.instance }}"
              description: "CPU usage is {{ $value | printf \"%.1f\" }}% which is above 80% for 5 minutes."

          - alert: HighMemoryUsage
            expr: |
              (
                1 - (
                  node_memory_MemAvailable_bytes /
                  node_memory_MemTotal_bytes
                )
              ) * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High Memory on {{ $labels.instance }}"
              description: "Memory usage is {{ $value | printf \"%.1f\" }}% which is above 85% for 5 minutes."

          - alert: HighDiskUsage
            expr: |
              (
                1 - (
                  node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} /
                  node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"}
                )
              ) * 100 > 80
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "High Disk on {{ $labels.instance }}"
              description: "Disk usage is {{ $value | printf \"%.1f\" }}% which is above 80%."
