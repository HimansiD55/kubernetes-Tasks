apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: default          # change if you use a different namespace
type: Opaque
stringData:
  # ✅ Use stringData — Kubernetes base64-encodes these for you automatically.
  # Change the values below to your own credentials before applying.
  MONGO_INITDB_ROOT_USERNAME: "adminuser"
  MONGO_INITDB_ROOT_PASSWORD: "SuperSecret123!"
